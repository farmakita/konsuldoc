services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        - HTTP_PROXY=${http_proxy}
        - HTTPS_PROXY=${http_proxy}
        - NO_PROXY=${no_proxy}
        - http_proxy=${http_proxy}
        - https_proxy=${http_proxy}
        - no_proxy=${no_proxy}
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - DB_PATH=/data/konsuldoc.db
      - HTTP_PROXY=${http_proxy}
      - HTTPS_PROXY=${http_proxy}
      - NO_PROXY=${no_proxy}
      - http_proxy=${http_proxy}
      - https_proxy=${http_proxy}
      - no_proxy=${no_proxy}
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-Y", "off", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  mobile-dev:
    build:
      context: .
      dockerfile: mobile/Dockerfile.dev
      args:
        - HTTP_PROXY=${http_proxy}
        - HTTPS_PROXY=${http_proxy}
        - NO_PROXY=${no_proxy}
        - http_proxy=${http_proxy}
        - https_proxy=${http_proxy}
        - no_proxy=${no_proxy}
    ports:
      - "8081:8081"
    environment:
      - EXPO_PUBLIC_API_URL=http://server:8080
      - HTTP_PROXY=${http_proxy}
      - HTTPS_PROXY=${http_proxy}
      - NO_PROXY=${no_proxy}
      - http_proxy=${http_proxy}
      - https_proxy=${http_proxy}
      - no_proxy=${no_proxy}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - ./mobile:/app
      - ./shared:/shared
      - mobile_node_modules:/app/node_modules
    depends_on:
      server:
        condition: service_healthy
    stdin_open: true
    tty: true

  mobile-web:
    build:
      context: .
      dockerfile: mobile/Dockerfile.web
      args:
        - HTTP_PROXY=${http_proxy}
        - HTTPS_PROXY=${http_proxy}
        - NO_PROXY=${no_proxy}
        - http_proxy=${http_proxy}
        - https_proxy=${http_proxy}
        - no_proxy=${no_proxy}
    ports:
      - "3000:8081"
    environment:
      - EXPO_PUBLIC_API_URL=http://server:8080
      - HTTP_PROXY=${http_proxy}
      - HTTPS_PROXY=${http_proxy}
      - NO_PROXY=${no_proxy}
      - http_proxy=${http_proxy}
      - https_proxy=${http_proxy}
      - no_proxy=${no_proxy}
      - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED:-}
    depends_on:
      server:
        condition: service_healthy

volumes:
  sqlite_data:
  mobile_node_modules:
